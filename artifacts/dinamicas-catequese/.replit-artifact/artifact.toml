kind = "web"
previewPath = "/"
title = "Dinâmicas Catequese - Landing Page"
version = "1.0.0"
id = "artifacts/dinamicas-catequese"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21109

[services.development]
run = "pnpm --filter @workspace/dinamicas-catequese run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dinamicas-catequese", "run", "build" ]
publicDir = "artifacts/dinamicas-catequese/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21109"
BASE_PATH = "/"
